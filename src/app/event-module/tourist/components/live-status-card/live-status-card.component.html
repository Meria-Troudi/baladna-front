<div class="live-status-container">
  <!-- EVENT DETAIL VIEW (replaces cards when selectedEvent is set) -->
  <div *ngIf="selectedEvent" class="event-detail-container">
    <!-- Return Button - same as events-list -->
    <button class="btn-return" (click)="closeDetailView()">
      ← Return to Live Status
    </button>
    
    <app-event-detail-view 
      [event]="selectedEvent"
      [userType]="'tourist'"
      (close)="closeDetailView()">
    </app-event-detail-view>
  </div>

  <!-- LIVE STATUS CARDS MODE (DEFAULT - shown when selectedEvent is null) -->
  <div *ngIf="!selectedEvent">
    <!-- iOS-style Toggle - Always visible -->
    <div class="ios-toggle-container">
      <button 
        class="ios-btn" 
        [class.active]="viewMode === 'upcoming'"
        (click)="setViewMode('upcoming')">
        Upcoming
      </button>
      <button 
        class="ios-btn" 
        [class.active]="viewMode === 'last'"
        (click)="setViewMode('last')">
        Last reservations
      </button>
    </div>

    <!-- Cards Grid - Show 3 cards in a row -->
    <div class="cards-grid" *ngIf="filteredEvents.length > 0">
      <div 
        class="live-card animate-slide clickable" 
        *ngFor="let event of filteredEvents; let i = index"
        (click)="viewEvent(event)"
        title="Click to view event details">
        <!-- Left Side: Image -->
        <div class="card-image">
          <img [src]="event.coverImage" [alt]="event.title">
          <div class="dist-overlay" *ngIf="event.distance">
            <i class="fas fa-location-arrow"></i> {{ event.distance }}
          </div>
        </div>
        
        <!-- Right Side: Info -->
        <div class="card-info">
          <div class="title-row">
            <h3>{{ event.title }}</h3>
            <div class="mini-progress">
              <svg>
                <circle class="circle-bg" cx="18" cy="18" r="15"/>
                <circle class="circle-fill" cx="18" cy="18" r="15" 
                  [style.stroke-dasharray]="getCircumference(event.progress) + ', 94'"/>
              </svg>
            </div>
          </div>

          <div class="meta-grid">
            <div class="meta-item">
              <span class="label">Starts At</span>
              <span class="val">{{ formatTime(event.startAt) }}</span>
            </div>
            <div class="meta-item">
              <span class="label">Location</span>
              <span class="val">{{ event.location }}</span>
            </div>
          </div>

          <div class="card-footer">
            <span class="id-text">ID: {{ formatEventId(event.eventId) }}</span>
            <span class="price-val"><strong>{{ event.price }}</strong> <small>EUR</small></span>
          </div>
        </div>
      </div>
    </div>

    <!-- Empty State - Show when no events for current view mode -->
    <div class="empty-state-card" *ngIf="filteredEvents.length === 0 && viewMode === 'upcoming'">
      <div class="empty-icon">
        <i class="fas fa-calendar-plus"></i>
      </div>
      <h3>No upcoming events</h3>
      <p>Check back later for new experiences!</p>
    </div>
    
    <div class="empty-state-card" *ngIf="filteredEvents.length === 0 && viewMode === 'last'">
      <div class="empty-icon">
        <i class="fas fa-history"></i>
      </div>
      <button 
        class="btn btn-primary" 
        (click)="viewReservations()">
        View My Reservations
      </button>
    </div>
  </div>
</div>
