<div class="create-post-card">
  <div class="post-input-area">
    <textarea
      [(ngModel)]="content"
      [placeholder]="placeholderText"
      (input)="autoResizeTextarea($event)"
      rows="1"
      maxlength="500"
    ></textarea>
    <div class="char-count">{{ remainingChars }}</div>
  </div>

  <!-- Media preview area (multiple files) -->
  <div class="media-preview-container" *ngIf="mediaFiles.length > 0">
    <div class="media-grid">
      <div class="media-item" *ngFor="let file of mediaFiles; let i = index">
        <img *ngIf="file.type.startsWith('image/')" [src]="file.preview" alt="preview">
        <video *ngIf="file.type.startsWith('video/')" [src]="file.preview" controls></video>
        <button class="remove-media" (click)="removeMedia(i)">✕</button>
      </div>
    </div>
  </div>

  <div class="post-actions-bar">
    <div class="left-actions">
      <button class="media-upload-btn" (click)="fileInput.click()">
        <i class="ph ph-image"></i> Add Media
      </button>
      <input type="file" #fileInput (change)="onFilesSelected($event)" multiple accept="image/*,video/*" style="display: none;">
      
      <select [(ngModel)]="selectedTopic" class="topic-select">
        <option value="OTHER">Other</option>
        <option value="EVENT">Event</option>
        <option value="ACCOMMODATION">Accommodation</option>
        <option value="FOOD">Food</option>
        <option value="TRAVEL">Travel</option>
        <option value="QUESTION">Question</option>
        <option value="MARKETPLACE">Marketplace</option>
      </select>
    </div>
    <button class="post-button" [disabled]="!canSubmit" (click)="submit()">
      Post
    </button>
  </div>
</div>
