<div class="pinned-card" *ngIf="post" (click)="open()">

  <div class="pinned-badge">
    📌 Pinned
  </div>

  <div class="content">
    <p>{{ post.content | slice:0:80 }}...</p>
  </div>

  <div class="stats">
    <span>💬 {{ post.commentsCount }}</span>
    <span>❤️ {{ post.likesCount }}</span>
  </div>

</div>
