<div class="step-category-container">
  <div class="step-header">
    <h2>Select Category</h2>
    <p>Choose the category that best describes your event</p>
  </div>

  <div class="category-grid">
    <div 
      *ngFor="let cat of categories"
      class="category-card"
      [class.selected]="selectedCategory === cat"
      (click)="selectCategory(cat)">
      
      <div class="category-info">
        <h3>{{ cat }}</h3>
      </div>
      
      <div class="category-check" *ngIf="selectedCategory === cat">
        ✓
      </div>
    </div>
  </div>

  <div class="selected-info" *ngIf="selectedCategory">
    <span class="selected-label">Selected:</span>
    <span class="selected-value">{{ selectedCategory }}</span>
  </div>
</div>
