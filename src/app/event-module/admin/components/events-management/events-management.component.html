<!-- Tab-specific stats -->
<div class="tab-stats">
  <div class="tab-stat-card primary">
    <div class="stat-bg-icon"><i class="bi bi-calendar-event-fill"></i></div>
    <div class="stat-content">
      <div class="stat-icon">
        <i class="bi bi-calendar-event-fill"></i>
      </div>
      <div class="tab-stat-value">{{ events.length }}</div>
      <div class="tab-stat-label">Total Events</div>
    </div>
  </div>
  <div class="tab-stat-card success">
    <div class="stat-bg-icon"><i class="bi bi-calendar-check-fill"></i></div>
    <div class="stat-content">
      <div class="stat-icon">
        <i class="bi bi-calendar-check-fill"></i>
      </div>
      <div class="tab-stat-value">{{ getUpcomingCount() }}</div>
      <div class="tab-stat-label">Upcoming</div>
    </div>
  </div>
  <div class="tab-stat-card warning">
    <div class="stat-bg-icon"><i class="bi bi-lightning-fill"></i></div>
    <div class="stat-content">
      <div class="stat-icon">
        <i class="bi bi-lightning-fill"></i>
      </div>
      <div class="tab-stat-value">{{ getOngoingCount() }}</div>
      <div class="tab-stat-label">Ongoing</div>
    </div>
  </div>
  <div class="tab-stat-card danger">
    <div class="stat-bg-icon"><i class="bi bi-x-circle-fill"></i></div>
    <div class="stat-content">
      <div class="stat-icon">
        <i class="bi bi-x-circle-fill"></i>
      </div>
      <div class="tab-stat-value">{{ getCanceledCount() }}</div>
      <div class="tab-stat-label">Canceled</div>
    </div>
  </div>
</div>

<!-- Filter Card -->
<div class="filter-card">
  <div class="filter-row">
    <div class="filter-group search-group">
      <i class="bi bi-search search-icon"></i>
      <input type="text" class="filter-input" [(ngModel)]="keyword" 
        placeholder="Search by title, host or category..."
        (input)="search()"/>
    </div>
    <div class="filter-group">
      <select class="filter-select" [(ngModel)]="selectedCategory" (change)="onCategoryChange()">
        <option value="">All categories</option>
        <option *ngFor="let cat of categories" [value]="cat.id">{{ cat.name }}</option>
      </select>
    </div>
    <div class="filter-group">
      <select class="filter-select" [(ngModel)]="selectedStatus" (change)="filterByStatus()">
        <option value="">All statuses</option>
        <option value="UPCOMING">Upcoming</option>
        <option value="ONGOING">Ongoing</option>
        <option value="FINISHED">Finished</option>
        <option value="CANCELED">Canceled</option>
        <option value="FULL">Full</option>
      </select>
    </div>
    <div class="filter-group">
      <button class="btn-filter" [class.active]="showDeleted" (click)="toggleShowDeleted()">
        <i class="bi bi-trash"></i>
        {{ showDeleted ? 'Hide deleted' : 'View deleted' }}
      </button>
    </div>
    <div class="filter-group">
      <button class="btn-reset" (click)="resetFilters()">
        <i class="bi bi-arrow-counterclockwise"></i>
      </button>
    </div>
  </div>
</div>

<app-dynamic-table
  [columns]="eventsColumns"
  [data]="events"
  [actions]="eventsActions"
  [filters]="eventsFilters"
  [loading]="loading"
  [emptyMessage]="'No events found'"
  (actionClick)="onTableActionClick($any($event))">
</app-dynamic-table>
