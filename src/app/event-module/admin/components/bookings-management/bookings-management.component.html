<!-- Tab-specific stats -->
<div class="tab-stats">
  <div class="tab-stat-card primary">
    <div class="stat-bg-icon"><i class="bi bi-ticket-fill"></i></div>
    <div class="stat-content">
      <div class="stat-icon">
        <i class="bi bi-ticket-fill"></i>
      </div>
      <div class="tab-stat-value">{{ bookings.length }}</div>
      <div class="tab-stat-label">Total Bookings</div>
    </div>
  </div>
  <div class="tab-stat-card success">
    <div class="stat-bg-icon"><i class="bi bi-check-circle-fill"></i></div>
    <div class="stat-content">
      <div class="stat-icon">
        <i class="bi bi-check-circle-fill"></i>
      </div>
      <div class="tab-stat-value">{{ getConfirmedBookingsCount() }}</div>
      <div class="tab-stat-label">Confirmed</div>
    </div>
  </div>
  <div class="tab-stat-card warning">
    <div class="stat-bg-icon"><i class="bi bi-credit-card-fill"></i></div>
    <div class="stat-content">
      <div class="stat-icon">
        <i class="bi bi-credit-card-fill"></i>
      </div>
      <div class="tab-stat-value">{{ getPaidBookingsCount() }}</div>
      <div class="tab-stat-label">Paid</div>
    </div>
  </div>
  <div class="tab-stat-card info">
    <div class="stat-bg-icon"><i class="bi bi-hourglass-split"></i></div>
    <div class="stat-content">
      <div class="stat-icon">
        <i class="bi bi-hourglass-split"></i>
      </div>
      <div class="tab-stat-value">{{ getPendingBookingsCount() }}</div>
      <div class="tab-stat-label">Pending</div>
    </div>
  </div>
</div>

<!-- Filter Card -->
<div class="filter-card">
  <div class="filter-row">
    <div class="filter-group search-group">
      <i class="bi bi-search search-icon"></i>
      <input type="text" class="filter-input" [(ngModel)]="keyword" 
        placeholder="Search by event or tourist ID..."
        (input)="search()"/>
    </div>
    <div class="filter-group">
      <select class="filter-select" [(ngModel)]="selectedStatus" (change)="filterByStatus()">
        <option value="">All statuses</option>
        <option value="CONFIRMED">Confirmed</option>
        <option value="WAITLISTED">Waitlisted</option>
        <option value="CANCELLED">Cancelled</option>
        <option value="PRESENT">Present</option>
        <option value="NO_SHOW">No Show</option>
      </select>
    </div>
    <div class="filter-group">
      <select class="filter-select" [(ngModel)]="selectedRole">
        <option value="">All payments</option>
        <option value="PAID">Paid</option>
        <option value="PENDING">Pending</option>
        <option value="REFUNDED">Refunded</option>
      </select>
    </div>
    <div class="filter-group">
      <button class="btn-reset" (click)="resetFilters()">
        <i class="bi bi-arrow-counterclockwise"></i>
      </button>
    </div>
  </div>
</div>

<app-dynamic-table
  [columns]="bookingsColumns"
  [data]="bookings"
  [actions]="bookingsActions"
  [filters]="bookingsFilters"
  [loading]="loading"
  [emptyMessage]="'No bookings found'"
  (actionClick)="onTableActionClick($any($event))">
</app-dynamic-table>
