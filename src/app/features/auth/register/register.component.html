<!-- src/app/features/auth/register/register.component.html -->
<div class="auth-page">
  <div class="floating-shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
  </div>
  
  <a routerLink="/" class="back-home">
    <img src="assets/images/3172a956-597b-46e6-b092-443089304d89-removebg-preview.png" alt="BALA DNA Logo" class="auth-logo-img">
  </a>
  
  <div class="auth-card">
    <div class="auth-header">
      <img src="assets/images/3172a956-597b-46e6-b092-443089304d89-removebg-preview.png" alt="BALA DNA Logo" class="auth-header-logo">
      <h2>Create Account</h2>
      <p>Join BALADNA and explore Tunisia</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">First Name</label>
          <input formControlName="firstName" type="text" class="form-control"
            [class.is-invalid]="isInvalid('firstName')" placeholder="Your first name"/>
        </div>
        <div class="form-group">
          <label class="form-label">Last Name</label>
          <input formControlName="lastName" type="text" class="form-control"
            [class.is-invalid]="isInvalid('lastName')" placeholder="Your last name"/>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Email address</label>
        <input formControlName="email" type="email" class="form-control"
          [class.is-invalid]="isInvalid('email')"
          placeholder="your@email.com"/>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input formControlName="password" type="password" class="form-control"
          [class.is-invalid]="isInvalid('password')"
          placeholder="Minimum 6 characters"/>
      </div>

      <div class="form-group">
        <label class="form-label">You are</label>
        <select formControlName="role" class="form-control">
          <option value="TOURIST">Tourist - Explore Tunisia</option>
          <option value="HOST">Host / Guide - Offer my services</option>
          <option value="ARTISAN">Artisan - Offer my skills</option>
        </select>
        <p class="role-info">
          <i class="bi bi-info-circle"></i>
          Choose your main role on the platform
        </p>
      </div>

      <div class="form-group">
        <label class="form-label">Preferred Language</label>
        <select formControlName="preferredLanguage" class="form-control">
          <option value="FR">Français</option>
          <option value="EN">English</option>
          <option value="AR">العربية</option>
        </select>
      </div>

      <div class="terms-checkbox" [class.checked]="form.get('acceptTerms')?.value">
        <input type="checkbox" id="terms" formControlName="acceptTerms" />
        <label for="terms">
          <span class="checkmark"><i class="bi bi-check"></i></span>
          I accept the <a href="#">Terms of Use</a> and <a href="#">Privacy Policy</a>
        </label>
      </div>

      <div *ngIf="error" class="alert-error">
        {{ error }}
      </div>
      <div *ngIf="success" class="alert-success">
        <i class="bi bi-check-circle-fill"></i>
        Account created successfully! Log in now.
      </div>

      <button type="submit" class="btn btn-primary"
        [disabled]="form.invalid || loading">
        <span *ngIf="loading" class="spinner"></span>
        <i *ngIf="!loading" class="bi bi-person-plus"></i>
        {{ loading ? 'Creating...' : 'Create my account' }}
      </button>

      <p class="auth-footer">
        Already have an account?
        <a routerLink="/login">Log in</a>
      </p>
    </form>
  </div>
</div>
