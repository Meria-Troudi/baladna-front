<!-- features/auth/reset-password/reset-password.component.html -->
<style>
  .auth-page {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    padding: 2rem;
  }

  .auth-card {
    border: none;
    border-radius: 24px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    overflow: hidden;
    width: 100%;
    max-width: 450px;
  }

  .auth-header {
    background: linear-gradient(135deg, #4a90e2 0%, #e67e50 100%);
    padding: 2.5rem 2rem;
    text-align: center;
    color: white;
  }

  .auth-logo {
    width: 80px;
    height: 80px;
    background: rgba(255, 255, 255, 0.2);
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1rem;
    font-size: 2rem;
  }

  .auth-header h2 {
    font-weight: 800;
    margin-bottom: 0.5rem;
  }

  .auth-header p {
    opacity: 0.9;
    margin: 0;
  }

  .auth-body {
    padding: 2.5rem;
    background: white;
  }

  .form-label {
    font-weight: 600;
    color: #1e293b;
    margin-bottom: 0.5rem;
    font-size: 0.9rem;
  }

  .form-label i {
    margin-right: 0.35rem;
    color: #4a90e2;
  }

  .form-control {
    border: 2px solid #e2e8f0;
    border-radius: 12px;
    padding: 0.75rem 1rem;
    font-size: 0.95rem;
    transition: all 0.3s;
  }

  .form-control:focus {
    border-color: #4a90e2;
    box-shadow: 0 0 0 4px rgba(74, 144, 226, 0.1);
  }

  .form-control.is-invalid {
    border-color: #ef4444;
  }

  .invalid-feedback {
    color: #ef4444;
    font-size: 0.8rem;
    margin-top: 0.25rem;
  }

  .submit-btn {
    background: linear-gradient(135deg, #4a90e2 0%, #e67e50 100%);
    border: none;
    border-radius: 12px;
    padding: 1rem;
    font-weight: 600;
    font-size: 1rem;
    color: white;
    transition: all 0.3s;
    width: 100%;
  }

  .submit-btn:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(74, 144, 226, 0.4);
  }

  .submit-btn:disabled {
    opacity: 0.7;
    cursor: not-allowed;
  }

  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    color: #64748b;
    text-decoration: none;
    font-weight: 500;
    transition: all 0.3s;
    margin-top: 1rem;
  }

  .back-link:hover {
    color: #4a90e2;
    transform: translateX(-3px);
  }

  .alert-success {
    background: linear-gradient(135deg, #dcfce7, #bbf7d0);
    border: none;
    border-radius: 12px;
    color: #166534;
    padding: 1rem;
    text-align: center;
  }

  .alert-danger {
    background: linear-gradient(135deg, #fee2e2, #fecaca);
    border: none;
    border-radius: 12px;
    color: #dc2626;
    padding: 1rem;
  }

  .icon-success {
    font-size: 2rem;
    margin-bottom: 0.5rem;
    display: block;
  }
</style>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">
        <i class="bi bi-key-fill"></i>
      </div>
      <h2>BALADNA</h2>
      <p>Reset your password</p>
    </div>

    <div class="auth-body">
      <div *ngIf="success" class="text-center">
        <span class="icon-success">✅</span>
        <h5 class="fw-bold text-success mb-2">Password Changed!</h5>
        <p class="text-muted mb-3">Your password has been updated successfully.</p>
        <p class="small text-muted">Redirecting...</p>
      </div>

      <form *ngIf="!success" [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="mb-4">
          <label class="form-label">
            <i class="bi bi-lock"></i>
            New Password
          </label>
          <input formControlName="newPassword" type="password" class="form-control"
            [class.is-invalid]="form.get('newPassword')?.invalid && form.get('newPassword')?.touched"
            placeholder="Minimum 6 characters"/>
          <div class="invalid-feedback">Minimum 6 characters required</div>
        </div>

        <div *ngIf="error" class="alert alert-danger">
          <i class="bi bi-exclamation-triangle me-2"></i>
          {{ error }}
        </div>

        <button type="submit" class="submit-btn"
          [disabled]="form.invalid || loading">
          <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
          <i *ngIf="!loading" class="bi bi-check-circle me-2"></i>
          {{ loading ? 'Processing...' : 'Change Password' }}
        </button>

        <div class="text-center">
          <a routerLink="/login" class="back-link">
            <i class="bi bi-arrow-left"></i> Back to Login
          </a>
        </div>
      </form>
    </div>
  </div>
</div>
