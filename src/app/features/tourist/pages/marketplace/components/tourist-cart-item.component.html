<div class="cart-item">
  <img [src]="item.imageProduit || 'https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=500'" [alt]="item.nomProduit" />
  <div class="item-content">
    <h4>{{ item.nomProduit }}</h4>
    <p>{{ item.prix | currency: 'USD' }}</p>
    <div class="qty-row">
      <button (click)="changeQuantity(item.quantite - 1)">-</button>
      <span>{{ item.quantite }}</span>
      <button (click)="changeQuantity(item.quantite + 1)">+</button>
    </div>
  </div>
  <button class="remove" (click)="remove.emit(item.idProduit)">Remove</button>
</div>
