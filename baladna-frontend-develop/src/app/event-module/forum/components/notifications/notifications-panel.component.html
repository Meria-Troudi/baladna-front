<div class="notif-overlay" (click)="close.emit()"></div>

<div class="notif-panel">

  <div class="header">
    <h3>Notifications</h3>
    <div class="header-actions">
      <button class="mark-all-btn" (click)="markAllRead()">Mark all read</button>
      <button class="close-btn" (click)="close.emit()">✕</button>
    </div>
  </div>

  <div class="notif-list">

    <div *ngIf="loading" class="loading">Loading notifications...</div>

    <div
      *ngFor="let n of notifications"
      class="notif-item"
      [class.unread]="!n.isRead"
      (click)="onNotificationClick(n)">

      <div class="dot" *ngIf="!n.isRead"></div>

      <div class="avatar" *ngIf="n.actorAvatar">
        <img [src]="n.actorAvatar" alt="avatar" />
      </div>
      <div class="content">
        <p>{{ n.previewText }}</p>
        <small *ngIf="n.actorName">{{ n.actorName }}</small>
        <small>{{ n.createdAt | date:'short' }}</small>
      </div>

    </div>

    <div class="empty" *ngIf="!loading && notifications.length === 0">
      No notifications
    </div>

  </div>

</div>
