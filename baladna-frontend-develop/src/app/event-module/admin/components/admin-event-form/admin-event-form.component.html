<div class="admin-event-form-container">
  <div class="form-header">
    <h2>{{ isEdit ? 'Edit Event' : 'Create New Event' }}</h2>
    <p class="subtitle">Admin Event Management</p>
  </div>

  <!-- Host Info Display (Edit Mode Only) -->
  <div *If="isEdit && hostInfo" class="host-info-card">
    <div class="host-info-header">
      <h4>Event Host</h4>
      <span class="badge badge-info">Read-only</span>
    </div>
    <div class="host-info-content">
      <p><strong>Host ID:</strong> {{ hostInfo?.id }}</p>
      <p><strong>Name:</strong> {{ hostInfo?.name }}</p>
      <p class="note">Note: Event host cannot be changed after creation.</p>
    </div>
  </div>

  <!-- Progress Steps -->
  <div class="progress-steps">
    <div class="step" [class.active]="step >= 1" [class.completed]="step > 1" (click)="goToStep(1)" [class.clickable]="step > 1">
      <div class="step-number">1</div>
      <div class="step-label">Category</div>
    </div>
    <div class="step-connector"></div>
    <div class="step" [class.active]="step >= 2" [class.completed]="step > 2" (click)="goToStep(2)" [class.clickable]="step > 2">
      <div class="step-number">2</div>
      <div class="step-label">Details</div>
    </div>
    <div class="step-connector"></div>
    <div class="step" [class.active]="step >= 3" [class.completed]="step > 3">
      <div class="step-number">3</div>
      <div class="step-label">Media</div>
    </div>
  </div>

  <!-- Form Content -->
  <form [formGroup]="eventForm" (ngSubmit)="submit()" class="event-form">
    <!-- Step 1: Category -->
    <div *ngIf="step === 1" class="form-step">
      <app-step-category
        [categories]="categories"
        [selectedCategory]="eventForm.get('category')?.value"
        (categorySelected)="selectCategory($event)"
      ></app-step-category>
    </div>

    <!-- Step 2: Details -->
    <div *ngIf="step === 2" class="form-step">
      <app-step-details [formGroup]="eventForm"></app-step-details>
    </div>

    <!-- Step 3: Media -->
    <div *ngIf="step === 3" class="form-step">
      <app-step-media
        [existingMedia]="mediaItems"
        [previewUrls]="previewUrls"
        [coverIndex]="coverIndex"
        (fileSelected)="onFileSelected($event)"
        (fileRemoved)="removeFile($event)"
        (coverSet)="setCover($event)"
        (fileMoved)="moveFile($event.from, $event.to)"
      ></app-step-media>
    </div>

    <!-- Navigation Buttons -->
    <div class="form-navigation">
      <button type="button" class="btn btn-secondary" (click)="prev()" *ngIf="step > 1">
        ← Previous
      </button>
      <button type="button" class="btn btn-primary" (click)="next()" *ngIf="step < 3">
        Next →
      </button>
      <button type="submit" class="btn btn-success" *ngIf="step === 3" [disabled]="loading || eventForm.invalid">
        <span *ngIf="loading" class="spinner"></span>
        {{ isEdit ? 'Update Event' : 'Create Event' }}
      </button>
      <button type="button" class="btn btn-outline" (click)="finish()" *ngIf="step === 3">
        Cancel
      </button>
    </div>
  </form>
</div>

<style>

    background: #17a2b8;

  }

  }

    color: #dc3545;

  }

  }

  }

  .step-number {

    height: 40px;

</style>
