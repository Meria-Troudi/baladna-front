<!-- LEFT CONTENT: Description, Tags, Host, Perks -->
<div class="event-info-section">

  <!-- TAGS -->
  <div class="tags-row" *ngIf="event">
    <span class="ev-tag">{{ event.location || 'Location' }}</span>
    <span class="ev-tag">{{ event.category || 'Category' }}</span>
    <span class="ev-tag">{{ getEventStatus() }}</span>
  </div>

  <!-- DESCRIPTION -->
  <div class="description-content">
    <p class="desc-lead" *ngIf="event?.description">
      {{ event?.description }}
    </p>

    <p class="desc-body" *ngIf="event?.description">
      {{ event?.description }}
    </p>

    <!-- Show placeholder if no description -->
    <p class="desc-lead" *ngIf="!event?.description">
      No description available for this event.
    </p>
  </div>


  <!-- HOST INFO -->
  <div class="host-strip" *ngIf="event">
    <div class="host-avatar">
      H
    </div>
    <div class="host-info">
      <h4>Host Information</h4>
      <p>Event hosted by our team</p>
    </div>
  </div>

</div>
